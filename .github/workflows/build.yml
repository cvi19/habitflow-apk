name: Build HabitFlow APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify buildozer.spec exists
        run: |
          pwd
          ls -la buildozer.spec
          if [ -f buildozer.spec ]; then
            echo "✓ buildozer.spec found!"
          else
            echo "✗ buildozer.spec NOT found!"
            exit 1
          fi

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk build-essential git zip unzip wget autoconf libtool pkg-config zlib1g-dev libssl-dev libffi-dev libsqlite3-dev libncurses5-dev libncursesw5-dev ccache cmake python3-dev || exit 1

      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

      - name: Install Python build tools
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0
          pip install cython==0.29.33

      - name: Setup Android SDK in buildozer path
        run: |
          BSDK=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $BSDK/cmdline-tools
          mkdir -p $BSDK/tools/bin
          mkdir -p $BSDK/licenses
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/ct.zip
          unzip -q /tmp/ct.zip -d /tmp/ct
          mv /tmp/ct/cmdline-tools $BSDK/cmdline-tools/latest
          echo "#!/bin/bash" > $BSDK/tools/bin/sdkmanager
          echo 'exec "'$BSDK'/cmdline-tools/latest/bin/sdkmanager" "$@"' >> $BSDK/tools/bin/sdkmanager
          chmod +x $BSDK/tools/bin/sdkmanager
          echo "#!/bin/bash" > $BSDK/tools/bin/avdmanager
          echo 'exec "'$BSDK'/cmdline-tools/latest/bin/avdmanager" "$@"' >> $BSDK/tools/bin/avdmanager
          chmod +x $BSDK/tools/bin/avdmanager
          echo "ANDROID_SDK_ROOT=$BSDK" >> $GITHUB_ENV
          echo "ANDROID_HOME=$BSDK" >> $GITHUB_ENV
          echo "$BSDK/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$BSDK/tools/bin" >> $GITHUB_PATH
          echo "$BSDK/platform-tools" >> $GITHUB_PATH

      - name: Accept licenses and install SDK packages
        run: |
          BSDK=$HOME/.buildozer/android/platform/android-sdk
          printf "24333f8a63b6825ea9c5514f83c2829b004d1fee\nd56f5187479451eabf01fb78af6dfcb131a6481e\n84831b9409646a918e30573bab4c9c91346d8abd\n" > $BSDK/licenses/android-sdk-license
          printf "d975f751698a77b662f1254ddbeed3901e976f5a\n84831b9409646a918e30573bab4c9c91346d8abd\n" > $BSDK/licenses/android-sdk-preview-license
          $BSDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$BSDK "platform-tools" "platforms;android-33" "build-tools;33.0.2" "ndk;25.2.9519653"

      - name: Cache Buildozer directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-v7
          restore-keys: buildozer-${{ runner.os }}-

      - name: Clear buildozer cache for fresh download
        run: |
          echo "Clearing old buildozer cache to prevent stale dependencies..."
          rm -rf ~/.buildozer/android/packages
          rm -rf ~/.buildozer/android/platform/build-arm64-v8a
          echo "Cache cleared. Fresh build will be performed."

      - name: Build APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          BSDK=$HOME/.buildozer/android/platform/android-sdk
          export ANDROID_SDK_ROOT=$BSDK
          export ANDROID_HOME=$BSDK
          export PATH=$BSDK/cmdline-tools/latest/bin:$BSDK/tools/bin:$BSDK/platform-tools:$PATH
          echo "sdkmanager version:" && $BSDK/tools/bin/sdkmanager --version
          buildozer -v android debug 2>&1 | tee build.log
          ls bin/*.apk && echo "APK built successfully!" || (tail -80 build.log && exit 1)
        env:
          GRADLE_OPTS: "-Xmx2560m -Dorg.gradle.jvmargs=-Xmx2560m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HabitFlow-APK
          path: bin/*.apk
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
