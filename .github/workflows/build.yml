name: Build Android APK
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            python3 \
            python3-pip \
            python3-setuptools \
            python3-virtualenv \
            wget \
            zip \
            unzip \
            openjdk-17-jdk \
            libstdc++6 \
            aidl \
            libffi-dev \
            libssl-dev \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo6 \
            cmake \
            automake \
            autopoint \
            gettext

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Buildozer
        run: pip install --upgrade buildozer cython

      - name: Build with Buildozer
        id: buildozer
        run: |
          # The "echo y" part automatically accepts the Android SDK licenses
          # which prevents the "Aidl not found" error.
          echo "y" | buildozer -v android debug
        
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          # Buildozer puts the finished .apk in the 'bin/' folder
          path: bin/*.apk
