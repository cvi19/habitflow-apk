name: Build HabitFlow APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openjdk-17-jdk \
            build-essential \
            git \
            zip \
            unzip \
            wget \
            curl \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libssl-dev \
            libffi-dev \
            libsqlite3-dev \
            libncurses5-dev \
            libncursesw5-dev \
            ccache

      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

      - name: Install Android SDK command-line tools manually
        run: |
          # Create SDK directory
          mkdir -p $HOME/android-sdk/cmdline-tools

          # Download the latest Android command-line tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip

          # Extract into the correct folder structure
          unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools-extracted
          mv /tmp/cmdline-tools-extracted/cmdline-tools $HOME/android-sdk/cmdline-tools/latest

          # Export paths
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      - name: Accept Android SDK licenses
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export PATH=$HOME/android-sdk/cmdline-tools/latest/bin:$PATH

          # Accept all licenses
          yes | sdkmanager --licenses || true

          # Install required SDK packages
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0
          pip install cython==0.29.33

      - name: Cache Buildozer directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}-v2
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Configure Buildozer to use existing Android SDK
        run: |
          # Tell buildozer to use the SDK we already installed
          mkdir -p ~/.buildozer/android/platform
          ln -sf $HOME/android-sdk ~/.buildozer/android/platform/android-sdk || true

          # Set buildozer config to skip SDK download
          cat >> buildozer.spec << 'EOF'

          # Point to pre-installed SDK
          android.sdk_path = /home/runner/android-sdk
          android.ndk_path = /home/runner/android-sdk/ndk/25.2.9519653
          EOF

      - name: Build APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$HOME/android-sdk/cmdline-tools/latest/bin:$HOME/android-sdk/platform-tools:$PATH

          # Run buildozer
          buildozer -v android debug 2>&1 | tee build.log

          # Check if APK was created
          if ls bin/*.apk 1>/dev/null 2>&1; then
            echo "✅ APK built successfully!"
            ls -lh bin/*.apk
          else
            echo "❌ APK not found. Last 50 lines of build log:"
            tail -50 build.log
            exit 1
          fi
        env:
          GRADLE_OPTS: "-Xmx2560m -Dorg.gradle.jvmargs=-Xmx2560m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HabitFlow-APK
          path: bin/*.apk
          retention-days: 30

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
